version: "3.9"

services:
  # ── Nginx 反向代理 ──
  nginx:
    image: nginx:alpine
    container_name: risk-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_data:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # ── Next.js 前端 ──
  frontend:
    build: ./frontend
    container_name: risk-frontend
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=${API_URL:-http://localhost:8000}
    restart: unless-stopped

  # ── FastAPI 后端 ──
  backend:
    build: ./backend
    container_name: risk-backend
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_started
    restart: unless-stopped

  # ── Celery Worker (评估引擎) ──
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: risk-worker
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_started
    deploy:
      replicas: 2
    restart: unless-stopped

  # ── Celery Beat (定时调度) ──
  beat:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: risk-beat
    command: celery -A tasks beat --loglevel=info
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  # ── Redis (消息队列 + 缓存) ──
  redis:
    image: redis:7-alpine
    container_name: risk-redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: risk-postgres
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${DB_USER:-risk}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-crypto_risk}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  certbot_data:
  certbot_certs:
